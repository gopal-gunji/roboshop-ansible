- name: create ec2 instance and r53 records
  hosts: all
  connection: local
  vars:
    sg_id: sg-02e0791460060eb90
    ami_id: ami-0220d79f3f480ecf5
    environment: dev
    instance:
    - mongodb
    - catalogue
  tasks:
  - name: create ec2 instance
    amazon.aws.ec2_instance:
      instance_type: t2.micro
      image_id: "{{ ami_id }}"  
      security_group: "{{ sg_id }}"
      name: "{{ item }}-{{ environment }}"
      tags:
        Project: roboshop
        Component: "{{ item }}"
        Environment: "{{ environment }}"
        Name: "{{ item }}-{{ environment }}"
    loop: "{{ instance }}"
    register: ec2-output
  - name: print the output of ec2 instance
    ansible.builtin.debug:
      msg: "{{ ec2-output }}"



