
# ansible-playbook -i localhost, \ -e '{"instances":["mongodb", "catalogue", "redis", "user","cart", "mysql", "shipping", "rabbitmq", "payment", "frontend"]}' \ roboshop.yaml

- name: create ec2 instance and r53 records
  hosts: all
  connection: local
  vars:
    sg_id: sg-02e0791460060eb90
    ami_id: ami-0220d79f3f480ecf5
    domain_name: durgagopalakrishna.online
    env: dev
    action: create
    instances:
    - mongodb
    - catalogue
  tasks:
  - name: create ec2 instance
    amazon.aws.ec2_instance:
      instance_type: t3.micro
      image_id: "{{ ami_id }}"  
      security_group: "{{ sg_id }}"
      name: "{{ item }}-{{ env }}"
      tags:
        Project: roboshop
        Component: "{{ item }}"
        Environment: "{{ env }}"
        Name: "{{ item }}-{{ env }}"
    loop: "{{ instances }}"
    register: ec2_output
    when: action == "create"


  - name: print the output
    ansible.builtin.debug:
      msg: "{{ ec2_output }}"
    when: action == "create"

  - name: create r53 records
    amazon.aws.route53:
      state: present
      zone: "{{domain_name}}"
      record: "{{ item.item }}-{{ env }}.{{ domain_name }}" # mongodb-dev.durgagopalakrishna.online
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      wait: true
    loop: "{{ ec2_output.results }}"
    when: action == "create"


  - name: create r53 records for frontend
    amazon.aws.route53:
      state: present
      zone: "{{domain_name}}"
      record: "roboshop-{{ item.item }}-{{ env }}.{{ domain_name }}" # roboshop-dev.durgagopalakrishna.online
      type: A
      ttl: 1
      value: "{{ item.instances[0].public_ip_address }}"
      wait: true
    loop: "{{ ec2_output.results }}"
    when: 
    - item.item == "frontend"
    - action == "create"



  
  - name: delete r53 records 
    amazon.aws.route53:
      state: absent
      zone: "{{domain_name}}"
      record: "{{ item }}-{{ env }}.{{ domain_name }}" # roboshop-dev.durgagopalakrishna.online
      type: A
      ttl: 1
    loop: "{{ instances }}"
    when: action == "destroy"

  - name: delete EC2 instance
    amazon.aws.ec2_instance:
      state: absent
      name: "{{ item }}-{{ env }}"
      wait: false
    loop: "{{ instances }}"
    when: action == "destroy"
